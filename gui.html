  /* device palette: PAL[0] black, PAL[1] #1d2b53, PAL[5] #5f574f grey body,
     PAL[6] #c2c3c7 sheen, PAL[7] #fff1e8 label, PAL[8] #ff004d stripe */
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: #000; color: #c2c3c7;
    font: 8px/1.6 'PS2P', 'Courier New', monospace;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #wrap {
    width: 100%; max-width: 860px; margin: 0 auto; padding: 16px;
    flex: 1; min-height: 0; display: flex; flex-direction: column;
  }

  /* ── the cartridge, mirroring enterTitle() ─────────────────────────── */
  #cart {
    background: #5f574f; border: 2px solid #000; border-radius: 10px;
    box-shadow: inset 0 3px 0 -1px #c2c3c7;              /* top sheen */
    padding-bottom: 4px; flex-shrink: 0;
  }
  .ridges {
    height: 14px; margin: 9px 20px 0;
    background: repeating-linear-gradient(
      #5f574f 0 2px, #1d2b53 2px 3px, #c2c3c7 3px 4px, #5f574f 4px 5px);
  }
  #label {
    background: #fff1e8; border-radius: 4px; margin: 10px 16px;
    padding-bottom: 10px;
  }
  .stripe { height: 4px; background: #ff004d; margin: 4px 4px 0; }
  #label h1 {
    font-size: 14px; font-weight: 400; color: #000; text-align: center;
    letter-spacing: 1px; margin: 14px 8px 8px;
  }
  #status {
    color: #5f574f; text-align: center; text-transform: uppercase;
  }
  #status.on { animation: blink 1s infinite; }
  #status.err { color: #ff004d; }
  @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }

  .controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: stretch;
    margin: 2px 16px 8px;
  }
  input, button {
    font: inherit; border: 2px solid #000; border-radius: 2px;
    padding: 10px 12px 9px; text-transform: uppercase;
  }
  input { background: #1d2b53; color: #fff1e8; text-transform: none; }
  input::placeholder { color: #83769c; }
  input:focus { outline: none; border-color: #29adff; }
  #theme { flex: 1; min-width: 160px; }
  button {
    cursor: pointer; background: #fff1e8; color: #000;
    box-shadow: 0 3px 0 #000; white-space: nowrap;
  }
  button:hover:not(:disabled) { background: #ffec27; }
  button:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
  button:disabled { opacity: .4; cursor: default; }
  .primary { background: #ff004d; color: #fff1e8; }
  .primary:hover:not(:disabled) { background: #ff004d; filter: brightness(1.15); }
  .danger:not(:disabled) { background: #000; color: #ff004d; border-color: #ff004d; }
  .pregen { display: flex; }
  .pregen button { border-radius: 2px 0 0 2px; }
  .pregen input {
    width: 58px; border-left: none; border-radius: 0 2px 2px 0;
    text-align: center; padding-left: 6px; padding-right: 6px;
  }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  #meta {
    text-align: right; margin: 0 18px 8px;
    font: 9px/1.4 ui-monospace, Menlo, monospace; color: #c2c3c7a0;
  }

  /* ── live TFT mirror ───────────────────────────────────────────────── */
  #bezel {
    position: relative; width: 512px; max-width: 100%; margin: 0 auto;
    background: #1a1a24; border: 2px solid #000; border-radius: 12px;
    padding: 12px; cursor: pointer; box-shadow: 0 4px 0 #000;
  }
  #scr {
    display: block; width: 100%; image-rendering: pixelated;
    background: #000; border: 2px solid #000;
  }
  #nosig {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #5f574f; letter-spacing: 2px;
    pointer-events: none;
  }

  /* ── panes ─────────────────────────────────────────────────────────── */
  .paneh {
    display: flex; align-items: center; gap: 10px;
    color: #83769c; letter-spacing: 2px; margin: 14px 2px 8px;
  }
  .paneh button { padding: 6px 10px 5px; box-shadow: 0 2px 0 #000; }
  #lib {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px; overflow-y: auto; max-height: 32vh; padding: 2px 2px 6px;
  }
  .cardg {
    background: #5f574f; border: 2px solid #000; border-radius: 6px;
    padding: 5px 5px 6px; cursor: pointer;
  }
  .cardg.sel { box-shadow: 0 0 0 3px #ffec27; }
  .ridg {
    height: 6px; margin: 1px 8px 5px;
    background: repeating-linear-gradient(
      #1d2b53 0 1px, #c2c3c7 1px 2px, #5f574f 2px 4px);
  }
  .clabel { background: #fff1e8; border-radius: 2px; padding-bottom: 6px; }
  .cstripe { height: 3px; background: #ff004d; margin: 3px 3px 5px; }
  .ct { color: #000; text-align: center; padding: 0 4px; word-break: break-word; }
  .cm {
    margin-top: 5px; text-align: center;
    font: 9px/1.5 ui-monospace, Menlo, monospace; color: #c2c3c7;
  }
  .chip { color: #ffec27; }

  #logpane { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  #log {
    flex: 1; overflow-y: auto; overscroll-behavior: contain;
    background: #000; border: 2px solid #5f574f; border-radius: 4px;
    padding: 10px 12px; white-space: pre-wrap; word-break: break-word;
    font: 12.5px/1.5 ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  #log div { min-height: 1.2em; }
  .l-cmd { color: #ff77a8; font-weight: 700; margin-top: .6em; }
  .l-roll { color: #29adff; }
  .l-ok { color: #00e436; }
  .l-err { color: #ff004d; }
  .l-warn { color: #ffec27; }
  .l-end { color: #83769c; }
  .gem { display: inline-block; width: 1.15em; }
  .gem.live { animation: gemshine .55s steps(1) infinite; }
  @keyframes gemshine {
    0% { color: #29adff; }
    33% { color: #fff1e8; }
    66% { color: #ffec27; }
  }

  /* ── dice roll (one block per @roll line from main.py) ─────────────── */
  .roll { margin: 4px 0 8px; display: flex; align-items: flex-end; gap: 18px; }
  .dstage {
    position: relative; height: 92px; width: 208px;
    flex-shrink: 0; overflow: hidden;
  }
  .die {
    position: absolute; top: 0; left: 0; width: 48px; height: 48px;
    background: #fff1e8; border: 2px solid #000; border-radius: 8px;
    box-shadow: 0 3px 0 #000;
    display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr);
    padding: 6px; gap: 2px;
  }
  .die i.p { background: #000; border-radius: 2px; }
  .rinfo {
    font: 8px/2 'PS2P', 'Courier New', monospace;
    flex: 1; min-width: 0; margin-bottom: -4px;  /* centre rows on the resting
                                                    dice (y 40..88, mid 64) */
    opacity: 0; transition: opacity .4s;
  }
  .rinfo.show { opacity: 1; }
  .rinfo b { color: #83769c; font-weight: 400; display: inline-block; width: 11ch; }
  .rinfo span { color: #fff1e8; }
  .wildtag { color: #ffec27; font-style: normal; }

  /* character card, shown when skinning completes */
  .skin { display: flex; align-items: center; gap: 18px; margin: 8px 0 10px; }
  .skin canvas { image-rendering: pixelated; flex-shrink: 0; }
  .skin .st { font: 10px/1.7 'PS2P', 'Courier New', monospace; color: #fff1e8; }
  .skin .sb {
    font: 8px/1.7 'PS2P', 'Courier New', monospace; color: #83769c;
    margin-top: 5px; max-width: 46ch;
  }

  /* theme card, shown when the score is baked (one per @music line) */
  .tune { display: flex; align-items: center; gap: 14px; margin: 8px 0 10px; }
  .tune button {
    font: 17px/1 monospace; width: 34px; height: 34px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; background: #ff004d; color: #fff1e8;
    border: 2px solid #000; box-shadow: 0 3px 0 #000; cursor: pointer;
  }
  .tune button:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
  .tune .tt { font: 10px/1.7 'PS2P', 'Courier New', monospace; color: #fff1e8; }
  .tune .tt .nb { font-size: 20px; line-height: 0; vertical-align: -4px; }
  .tune .tb {
    font: 8px/1.7 'PS2P', 'Courier New', monospace; color: #83769c;
    margin-top: 5px;
  }
  .wavbtn {
    float: right; font: 12px/1 monospace; padding: 2px 5px 3px;
    background: #1d2b53; color: #29adff; border: 1px solid #000;
    cursor: pointer; margin-left: 4px;
  }
  .wavbtn.on { background: #ff004d; color: #fff1e8; }

  /* composing block: stage line + live 8-bit waveform, swapped in place
     for the theme card when the score lands */
  .compose canvas {
    display: block; margin: 5px 0 2px 18px;
    width: 252px; height: 48px; image-rendering: pixelated;
  }

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let cursor = 0, sel = null, lastLib = '', busyNow = false;
const DEV = location.pathname.startsWith('/dev');   // library, pregen, screen: dev-only
if (!DEV) {
  $('libpane').style.display = 'none';
  $('pregen').style.display = 'none';
  $('scrpane').style.display = 'none';
}

function cls(l) {
  if (l.startsWith('$')) return 'l-cmd';
  if (l.startsWith('— exit')) return 'l-end';
  if (l.includes('✗')) return 'l-err';
  if (l.includes('✓')) return 'l-ok';
  if (l.startsWith('◆')) return 'l-roll';
  const t = l.trim();
  if (t.startsWith('!') || t.startsWith('·') || t.startsWith('—')) return 'l-warn';
  return '';
}

const PIPS = {1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8],
              5: [0, 2, 4, 6, 8], 6: [0, 3, 6, 2, 5, 8]};
const rface = () => 1 + Math.floor(Math.random() * 6);

function dieFace(el, n) {
  el.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const p = document.createElement('i');
    if (PIPS[n].includes(i)) p.className = 'p';
    el.appendChild(p);
  }
}

function addDice(data) {
  const w = document.createElement('div');
  w.className = 'roll';
  w.innerHTML =
    '<div class="dstage"><div class="die"></div><div class="die"></div></div>' +
    '<div class="rinfo"></div>';
  $('log').appendChild(w);
  const av = String(data.avatar || '?').replace(/^SPR_?/, '')
    .toLowerCase().replace(/_/g, ' ');
  const mech = [data.verb ? String(data.verb).toLowerCase() + ' ' + data.goal : '',
                data.twist && data.twist !== 'none' ? data.twist : '']
    .filter(Boolean).join(' · ');
  const row = (k, v) => `<div><b>${k}</b><span>${v}</span></div>`;
  w.querySelector('.rinfo').innerHTML =
    row('GENRE', esc(data.genre || '?')) +
    row('MECHANIC', esc(mech || '?')) +
    row('CHARACTER', esc(av)) +
    row('SETTING', esc(data.setting || '?') +
      (data.wild_kind ? ` <i class="wildtag">WILD:${esc(data.wild_kind)}</i>` : ''));
  rollDice(w);
}

const SND = new Audio('/dice.mp3');            // clatter; the settle is at 0:02
SND.preload = 'auto';

function rollDice(w) {
  const stage = w.querySelector('.dstage');
  const [ea, eb] = stage.querySelectorAll('.die');
  const info = w.querySelector('.rinfo');
  const fa = rface(), fb = rface();            // faces random on every roll
  const floor = 40, cx = Math.max(stage.clientWidth / 2, 90);
  const rest = [cx - 56, cx + 8];
  dieFace(ea, fa); dieFace(eb, fb);
  const done = () => {
    ea.style.transform = `translate(${rest[0]}px, ${floor}px)`;
    eb.style.transform = `translate(${rest[1]}px, ${floor}px)`;
    dieFace(ea, fa); dieFace(eb, fb);
    info.classList.add('show');
  };
  try { SND.currentTime = 0; } catch (_) {}
  const p = SND.play();                        // needs a prior user gesture
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return done();
  const LAND = 2000, COLL = 700;               // touchdown pinned to 0:02
  const off = Math.min(180, cx - 40);
  const a0 = cx - off - 48, b0 = cx + off;     // entry x, off both stage edges
  const ac = cx - 52, bc = cx + 4;             // collision x: faces touching
  const lerp = (u, v, t) => u + (v - u) * t;
  let t0 = 0, started = false, hit = false, tum = 0, held = false;
  function frame(ts) {
    const el = ts - t0;
    if (el >= LAND) return done();
    let ax, bx, ay, by;
    if (el < COLL) {                           // fly in, falling
      const t = el / COLL;
      ax = lerp(a0, ac, t); bx = lerp(b0, bc, t);
      ay = -64 + 70 * t * t; by = -80 + 86 * t * t;
      if (!hit && el > COLL - 60) {            // impact shake
        hit = true;
        stage.style.transform = 'translate(2px,1px)';
        setTimeout(() => stage.style.transform = '', 70);
      }
    } else {                                   // bounce apart, arc to rest
      const t = (el - COLL) / (LAND - COLL);
      const e = 1 - (1 - t) * (1 - t);
      ax = lerp(ac, rest[0], e); bx = lerp(bc, rest[1], e);
      ay = by = lerp(6, floor, t) - 80 * t * (1 - t);
    }
    if (el < 1600) {                           // tumble, then hold final faces
      if (el - tum > 90) { tum = el; dieFace(ea, rface()); dieFace(eb, rface()); }
    } else if (!held) { held = true; dieFace(ea, fa); dieFace(eb, fb); }
    ea.style.transform =                       // 4px grid = chunky 8-bit motion
      `translate(${Math.round(ax / 4) * 4}px, ${Math.round(ay / 4) * 4}px)`;
    eb.style.transform =
      `translate(${Math.round(bx / 4) * 4}px, ${Math.round(by / 4) * 4}px)`;
    requestAnimationFrame(frame);
  }
  const begin = () => {                        // clock starts when audio does,
    if (started) return;                       // so landing rides the sound
    started = true;
    t0 = performance.now();
    requestAnimationFrame(frame);
  };
  (p || Promise.resolve()).then(begin).catch(begin);
  setTimeout(begin, 300);                      // audio blocked/slow — go anyway
}

async function addChar(data) {
  const log = $('log');
  const stick = log.scrollTop + log.clientHeight >= log.scrollHeight - 40;
  const w = document.createElement('div');
  w.className = 'skin';
  const cv = document.createElement('canvas');
  cv.width = cv.height = 96;
  const tx = document.createElement('div');
  tx.innerHTML = `<div class="st">${esc(data.title || '?')}</div>` +
                 `<div class="sb">${esc(data.blurb || '')}</div>`;
  w.appendChild(cv);
  w.appendChild(tx);
  log.appendChild(w);
  if (stick) log.scrollTop = log.scrollHeight;
  try {
    const r = await fetch('/api/sprite/' + encodeURIComponent(data.avatar || ''));
    if (!r.ok) return;
    const s = await r.json();
    const sc = 96 / s.w, ctx = cv.getContext('2d');
    const draw = f => {
      ctx.clearRect(0, 0, 96, 96);
      s.frames[f].forEach((row, y) => row.forEach((v, x) => {
        if (v) { ctx.fillStyle = s.pal[v]; ctx.fillRect(x * sc, y * sc, sc, sc); }
      }));
    };
    draw(0);
    if (s.frames.length > 1) {          // walk cycle, ~device cadence (30fps>>3)
      let f = 0;
      const iv = setInterval(() => {
        if (!cv.isConnected) return clearInterval(iv);
        draw(f = 1 - f);
      }, 250);
    }
  } catch (_) {}
}

const TUNE = new Audio();                // one theme snippet plays at a time
let tuneBtn = null;
function tuneIdle() {
  if (tuneBtn) {
    tuneBtn.textContent = tuneBtn.dataset.g;
    tuneBtn.classList.remove('on');
    tuneBtn = null;
  }
}
TUNE.onended = tuneIdle;
function playWav(dir, btn) {
  const same = tuneBtn === btn && !TUNE.paused;
  tuneIdle();
  TUNE.pause();
  if (same) return;                      // second press = stop
  TUNE.src = '/api/wav/' + encodeURIComponent(dir);
  TUNE.play().catch(() => {});
  tuneBtn = btn;
  btn.textContent = '■';
  btn.classList.add('on');
}

const composeQ = [];                   // composing blocks awaiting their score
function startWave() {
  const cv = document.createElement('canvas');
  cv.width = 63; cv.height = 12;       // 32 one-px bars, ×4 CSS = chunky pixels
  const ctx = cv.getContext('2d');
  let t = 0;
  cv._iv = setInterval(() => {
    if (!cv.isConnected) return clearInterval(cv._iv);
    ctx.clearRect(0, 0, 63, 12);
    ctx.fillStyle = '#fff1e8';
    for (let i = 0; i < 32; i++) {
      const h = 2 + Math.round((Math.sin(i * .55 - t * .5) * .5 + .5) * 9);
      ctx.fillRect(i * 2, (12 - h) >> 1, 1, h);
    }
    t++;
  }, 90);
  return cv;
}
function killWave(blk) {
  const cv = blk.querySelector('canvas');
  if (cv) { clearInterval(cv._iv); cv.remove(); }
}
function waveDead(newest) {            // the score never arrives: stop the bars
  const blk = newest ? composeQ.pop() : composeQ.shift();
  if (blk) killWave(blk);
}

function addTheme(data) {
  const log = $('log');
  const stick = log.scrollTop + log.clientHeight >= log.scrollHeight - 40;
  const w = document.createElement('div');
  w.className = 'tune';
  const b = document.createElement('button');
  b.dataset.g = '▶';
  b.textContent = '▶';
  b.onclick = () => playWav(data.dir, b);
  const tx = document.createElement('div');
  tx.innerHTML = `<div class="tt"><span class="nb">♪</span> ` +
                 `${esc(data.title || '?')} THEME</div>` +
                 `<div class="tb">${esc(data.tempo || '?')} bpm</div>`;
  w.appendChild(b);
  w.appendChild(tx);
  const blk = composeQ.shift();        // scores resolve in build (FIFO) order
  if (blk && blk.isConnected) {
    killWave(blk);
    blk.replaceWith(w);
  } else {
    log.appendChild(w);
  }
  if (stick) log.scrollTop = log.scrollHeight;
}

function addLines(lines) {
  if (!lines.length) return;
  const log = $('log');
  const stick = log.scrollTop + log.clientHeight >= log.scrollHeight - 40;
  for (const l of lines) {
    if (l.startsWith('@roll ')) {
      try { addDice(JSON.parse(l.slice(6))); } catch (_) {}
      continue;
    }
    if (l.startsWith('@skin ')) {
      try { addChar(JSON.parse(l.slice(6))); } catch (_) {}
      continue;
    }
    if (l.startsWith('@music ')) {
      try { addTheme(JSON.parse(l.slice(7))); } catch (_) {}
      continue;
    }
    const d = document.createElement('div');
    d.className = cls(l);
    const txt = l.replace(/\n$/, '');
    if (txt.includes('theme failed') || txt.includes('forge failed')
        || txt.includes('producer hiccup (build)'))
      waveDead();                       // oldest block: builds die in FIFO order
    if (txt.includes('producer hiccup (author)'))
      waveDead(true);                   // author died mid-game: reap its own
    if (txt.startsWith('◆')) {          // stage line: its gem can twinkle
      const g = document.createElement('span');
      g.className = 'gem';
      g.textContent = '◆';
      d.appendChild(g);
      const tn = document.createTextNode(txt.slice(1));
      d.appendChild(tn);
      setGem(g, tn, txt.slice(1), txt.includes('implementing'));
      if (txt.includes('composing theme')) {
        const blk = document.createElement('div');
        blk.className = 'compose';      // line + live waveform, swapped for
        blk.appendChild(d);             // the theme card when @music lands
        blk.appendChild(startWave());
        composeQ.push(blk);
        log.appendChild(blk);
        continue;
      }
    } else {
      d.textContent = txt || ' ';
    }
    log.appendChild(d);
  }
  while (log.childElementCount > 4000) log.firstChild.remove();
  if (stick) log.scrollTop = log.scrollHeight;
}

let activeGem = null, activeTxt = null, activeOrig = '', quipOK = false,
    lastQuip = 0;
const GEMS = ['◆', '✦', '◇', '★'];
let gemTick = 0;
function setGem(g, tn, orig, quippy) {   // newest stage line owns the sparkle
  if (activeGem) {
    activeGem.classList.remove('live');
    activeGem.textContent = '◆';
    if (activeTxt) activeTxt.textContent = activeOrig;   // restore true label
  }
  activeGem = g; activeTxt = tn; activeOrig = orig;
  quipOK = !!quippy; lastQuip = Date.now();
  if (busyNow) g.classList.add('live');
}
setInterval(() => {
  if (!activeGem || !activeGem.classList.contains('live')) return;
  gemTick = (gemTick + 1) % GEMS.length;
  activeGem.textContent = GEMS[gemTick];
}, 180);

let deck = [];
function quip() {                        // shuffled deck — no repeats until spent
  if (!deck.length) {
    deck = QUIPS.slice();
    for (let i = deck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
  }
  return deck.pop();
}
setInterval(() => {                      // implementing: quip every 10 s
  if (!quipOK || !activeTxt || !activeGem ||
      !activeGem.classList.contains('live')) return;
  if (Date.now() - lastQuip < 10000) return;
  lastQuip = Date.now();
  activeTxt.textContent = ' ' + quip();
}, 1000);

function renderLib(lib) {
  if (!DEV) return;
  const j = JSON.stringify(lib);
  if (j === lastLib) return;
  lastLib = j;
  $('libcount').textContent = '(' + lib.length + ')';
  const box = $('lib');
  box.innerHTML = '';
  [...lib].reverse().forEach(c => {
    const d = document.createElement('div');
    d.className = 'cardg' + (sel === c.dir ? ' sel' : '');
    d.innerHTML =
      `<div class="ridg"></div>` +
      `<div class="clabel"><div class="cstripe"></div>` +
      `<div class="ct">${esc(c.title)}</div></div>` +
      `<div class="cm">` +
      (c.wav ? `<button class="wavbtn" data-g="♪">♪</button>` : '') +
      `${esc(c.dir.slice(0, 3))} · ${esc(c.genre)} · ${esc(c.setting)}` +
      (c.theme ? `<br><span class="chip">${esc(c.theme)}</span>` : '') + `</div>`;
    const wb = d.querySelector('.wavbtn');
    if (wb) {
      wb.onclick = e => { e.stopPropagation(); playWav(c.dir, wb); };
      wb.ondblclick = e => e.stopPropagation();   // never bubble into flash
    }
    d.onclick = () => {
      sel = c.dir;
      box.querySelectorAll('.sel').forEach(e => e.classList.remove('sel'));
      d.classList.add('sel');
      $('b-flash').disabled = busyNow;
    };
    d.ondblclick = () => flash(c.dir);
    box.appendChild(d);
  });
}

function setBusy(b, label) {
  busyNow = b;
  ['b-forge', 'b-loop', 'b-pregen'].forEach(id => $(id).disabled = b);
  $('b-flash').disabled = b || !sel;
  $('b-stop').disabled = !b;
  const st = $('status');
  st.textContent = b ? label : 'READY';
  st.className = b ? 'on' : '';
  document.title = (b ? '⚒ ' : '') + 'INFINITE CARTRIDGE';
  if (activeGem) {
    activeGem.classList.toggle('live', b);
    if (!b) {
      activeGem.textContent = '◆';
      if (activeTxt) activeTxt.textContent = activeOrig;
    }
  }
  if (!b) while (composeQ.length) waveDead();   // run over: no score is coming
}

async function poll() {
  try {
    const r = await fetch('/api/state?since=' + cursor);
    const s = await r.json();
    if (s.total < cursor) { $('log').innerHTML = ''; cursor = 0; }   // server restarted
    else {
      cursor = s.total;
      addLines(s.lines);
      renderLib(s.library);
      setBusy(s.busy, s.label);
      $('meta').textContent = s.port + ' · ' + s.model;
    }
  } catch (e) {
    const st = $('status');
    st.textContent = 'SERVER GONE';
    st.className = 'err';
  }
  setTimeout(poll, 600);
}

async function run(body) {
  const r = await fetch('/api/run', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    addLines(['✗ ' + (e.err || r.status) + '\n']);
  }
}

function flash(d) { run({cmd: 'flash', dir: d}); }
const theme = () => $('theme').value.trim();
$('b-forge').onclick = () => run({cmd: 'forge', theme: theme()});
$('b-loop').onclick = () => run({cmd: 'loop', theme: theme()});
$('b-pregen').onclick = () => run({cmd: 'pregen', n: +$('n').value || 3, theme: theme()});
$('b-flash').onclick = () => sel && flash(sel);
$('b-stop').onclick = () => fetch('/api/stop', {method: 'POST'});
$('theme').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !busyNow) run({cmd: 'forge', theme: theme()});
});
let watching = false, scrTimer = null;
const scrCtx = $('scr').getContext('2d');
const scrImg = scrCtx.createImageData(160, 80);
async function grabFrame() {
  if (!watching || document.hidden) return;    // hidden tab: pumps go idle too
  try {
    const r = await fetch('/api/screen');
    if (r.status === 200) {
      const b = new Uint8Array(await r.arrayBuffer());
      if (b.length !== 25600) return;
      const d = scrImg.data;
      for (let i = 0, p = 0; i < 25600; i += 2, p += 4) {
        const v = b[i] | (b[i + 1] << 8);      // little-endian RGB565
        d[p] = (v >> 8) & 0xF8;
        d[p + 1] = (v >> 3) & 0xFC;
        d[p + 2] = (v << 3) & 0xF8;
        d[p + 3] = 255;
      }
      scrCtx.putImageData(scrImg, 0, 0);
      $('nosig').style.display = 'none';
    } else {
      $('nosig').textContent = 'NO SIGNAL';
      $('nosig').style.display = 'flex';
    }
  } catch (_) {}
}
$('bezel').onclick = () => {
  watching = !watching;
  $('scrhint').textContent = watching ? '— live' : '— click to watch';
  $('nosig').textContent = watching ? 'NO SIGNAL' : 'SCREEN OFF';
  $('nosig').style.display = 'flex';
  if (watching && !scrTimer) scrTimer = setInterval(grabFrame, 600);
  if (!watching && scrTimer) {
    clearInterval(scrTimer);
    scrTimer = null;
    scrCtx.clearRect(0, 0, 160, 80);
  }
};

    addLines(['◆ composing theme (in parallel) ...\n']);

                               tempo: 156}), 6000);
    addLines(['◆ implementing ...\n']);
    if (activeGem) {                           // fake 25s: sparkle + two quips
      const g = activeGem, tn = activeTxt, o = activeOrig;
      g.classList.add('live');
      setTimeout(() => {
        g.classList.remove('live');
        g.textContent = '◆';
        if (tn) tn.textContent = o;
      }, 25000);
    }
  };
}
